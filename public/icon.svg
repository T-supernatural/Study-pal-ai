<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with subtle soft gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4FEFF" />
      <stop offset="100%" stop-color="#E2F5F8" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E2F76" />
      <stop offset="100%" stop-color="#1B4BB5" />
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A9C0E0" />
      <stop offset="100%" stop-color="#7CA3D6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Maskable safe area container -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Soft Blue Glow Effect -->
  <circle cx="256" cy="256" r="160" fill="#A9C0E0" opacity="0.15" filter="url(#glow)" />

  <!-- Outer Neumorphic ring shadow -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#A9C0E0" stroke-width="4" opacity="0.3" />

  <!-- Brand Symbol Group (Book + AI Sparks) -->
  <g transform="translate(128, 128)">
    <!-- Book Left Page -->
    <path d="M128,40 C100,40 50,20 20,40 L20,200 C50,180 100,200 128,200 Z" fill="url(#primaryGrad)" />
    
    <!-- Book Right Page -->
    <path d="M128,40 C156,40 206,20 236,40 L236,200 C206,180 156,200 128,200 Z" fill="url(#primaryGrad)" opacity="0.9" />

    <!-- Center Binding Spine -->
    <rect x="124" y="32" width="8" height="176" rx="4" fill="url(#secondaryGrad)" />

    <!-- Book Pages Lines Details (Left) -->
    <path d="M40,75 L110,75 M40,110 L110,110 M40,145 L100,145" stroke="#F4FEFF" stroke-width="6" stroke-linecap="round" opacity="0.6" />

    <!-- Book Pages Lines Details (Right) -->
    <path d="M216,75 L146,75 M216,110 L146,110 M216,145 L156,145" stroke="#F4FEFF" stroke-width="6" stroke-linecap="round" opacity="0.6" />

    <!-- AI Floating Spark / Star 1 -->
    <path d="M128,0 C128,12 138,22 150,22 C138,22 128,32 128,44 C128,32 118,22 106,22 C118,22 128,12 128,0 Z" fill="#3B82F6" filter="url(#glow)" transform="translate(0, -45) scale(1.2)" />

    <!-- AI Floating Spark 2 -->
    <path d="M50,10 C50,16 55,21 61,21 C55,21 50,26 50,32 C50,26 45,21 39,21 C45,21 50,16 50,10 Z" fill="#A9C0E0" transform="translate(150, -20) scale(0.8)" />

    <!-- AI Floating Spark 3 -->
    <path d="M50,10 C50,16 55,21 61,21 C55,21 50,26 50,32 C50,26 45,21 39,21 C45,21 50,16 50,10 Z" fill="#A9C0E0" transform="translate(-15, -15) scale(0.6)" />
  </g>
</svg>
